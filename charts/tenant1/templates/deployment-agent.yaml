apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-agent
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      containers:
      - name: research-agent
        image: "{{ .Values.image.agent.repository }}:{{ .Values.image.agent.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}

        resources:
          requests:
            memory: "100Mi"
            cpu: "100m"
          limits:
            memory: "200Mi"
            cpu: "250m"
            
        # CONFIGURATION: Injects values from values.yaml via the ConfigMap
        envFrom:
        - configMapRef:
            name: {{ .Release.Name }}-config
            
        # STORAGE: Connects to the host-shared SQLite database
        volumeMounts:
        - name: shared-db
          mountPath: /app/data
          
      volumes:
      - name: shared-db
        hostPath:
          path: /tmp/fde_data
          type: DirectoryOrCreate
