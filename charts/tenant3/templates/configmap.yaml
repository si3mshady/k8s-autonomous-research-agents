apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  labels:
    app: {{ .Release.Name }}
data:
  # Pulls directly from the env block in your values.yaml
  OLLAMA_BASE_URL: {{ .Values.env.ollamaUrl | quote }}
  TAVILY_API_KEY: {{ .Values.env.tavilyApiKey | quote }}
  DB_PATH: {{ .Values.env.dbPath | quote }}
