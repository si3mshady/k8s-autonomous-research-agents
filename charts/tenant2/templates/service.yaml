apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-ui
  labels:
    app: {{ .Release.Name }}-ui
spec:
  type: ClusterIP
  ports:
    - port: 80           # The port other pods use to reach this service
      targetPort: 8501   # The port the container is actually listening on
      protocol: TCP
      name: http
  selector:
    app: {{ .Release.Name }}-ui # Must match the labels in your deployment.yaml
