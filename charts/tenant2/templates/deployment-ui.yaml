apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ui   # FIXED: Changed from -agent to -ui
  labels:
    app: {{ .Release.Name }}-ui  # FIXED: Added -ui suffix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-ui  # FIXED: This now matches your Service selector
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-ui  # FIXED: This ensures the pod gets the right label
    spec:
      containers:
      - name: research-ui
        image: "{{ .Values.image.ui.repository }}:{{ .Values.image.ui.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}

        ports:
        - containerPort: 8501
          name: http

        resources:
          requests:
            memory: "100Mi"
            cpu: "100m"
          limits:
            memory: "200Mi"
            cpu: "250m"

        # CONFIGURATION: Injects values from values.yaml via the ConfigMap
        envFrom:
        - configMapRef:
            name: {{ .Release.Name }}-config

        # STORAGE: Connects to the host-shared SQLite database
        volumeMounts:
        - name: shared-db
          mountPath: /app/data

      volumes:
      - name: shared-db
        hostPath:
          path: /tmp/fde_data
          type: DirectoryOrCreate
